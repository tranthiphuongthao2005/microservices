<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JSON Lens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="blob blob--1" aria-hidden="true"></div>
    <div class="blob blob--2" aria-hidden="true"></div>
    <div class="blob blob--3" aria-hidden="true"></div>

    <div class="page">
      <header class="hero">
        <div class="hero__text">
          <p class="eyebrow">Microservices JSON viewer</p>
          <h1>JSON Lens</h1>
        </div>
        <div class="hero__card">
          <h2>Quick Requests</h2>
          <p class="muted">Load a preset, then hit Send.</p>
          <div class="quick-grid">
            <button class="chip" data-preset="list-users" type="button">List users</button>
            <button class="chip" data-preset="list-products" type="button">List products</button>
            <button class="chip" data-preset="list-orders" type="button">List orders</button>
            <button class="chip" data-preset="order-detail" type="button">Order detail</button>
            <button class="chip" data-preset="create-user" type="button">Create user</button>
            <button class="chip" data-preset="create-product" type="button">Create product</button>
          </div>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <div class="panel__header">
            <h2>Request</h2>
            <div class="panel__actions">
              <button class="ghost" id="format-body" type="button">Format body</button>
              <button class="ghost" id="clear-form" type="button">Clear</button>
            </div>
          </div>

          <form id="request-form">
            <div class="field-row">
              <div class="field">
                <label for="service">Service</label>
                <select id="service" name="service">
                  <option value="user">User (3001)</option>
                  <option value="product">Product (3002)</option>
                  <option value="order">Order (3003)</option>
                  <option value="custom">Custom</option>
                </select>
              </div>
              <div class="field">
                <label for="method">Method</label>
                <select id="method" name="method">
                  <option value="GET">GET</option>
                  <option value="POST">POST</option>
                  <option value="PUT">PUT</option>
                  <option value="DELETE">DELETE</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="base-url">Base URL</label>
              <input id="base-url" name="base-url" type="text" value="http://localhost:3001" placeholder="http://localhost:3001" />
            </div>

            <div class="field">
              <label for="path">Path</label>
              <input id="path" name="path" type="text" value="/users" placeholder="/users" />
            </div>

            <div class="field">
              <label for="body">JSON body</label>
              <textarea id="body" name="body" rows="9" placeholder='{"name": "Alice", "email": "alice@example.com"}'></textarea>
              <p class="hint" id="body-note">Body is optional for POST and PUT.</p>
            </div>

            <div class="url-preview" id="url-preview">URL preview</div>
            <p class="error" id="form-error" role="alert"></p>

            <button class="primary" id="send-btn" type="submit">Send request</button>
          </form>
        </section>

        <section class="panel panel--response">
          <div class="panel__header">
            <h2>Response</h2>
            <div class="panel__actions">
              <button class="ghost" id="copy-response" type="button">Copy JSON</button>
            </div>
          </div>

          <div class="meta">
            <span class="badge" id="status-badge">Status: --</span>
            <span class="meta__item" id="time-ms">Time: --</span>
            <span class="meta__item" id="size-bytes">Size: --</span>
          </div>

          <div class="toggle" role="tablist">
            <button type="button" class="toggle__btn is-active" data-view="pretty" role="tab" aria-selected="true">Pretty</button>
            <button type="button" class="toggle__btn" data-view="raw" role="tab" aria-selected="false">Raw</button>
          </div>

          <pre id="pretty-output" class="output output--pretty" aria-live="polite">No response yet.</pre>
          <pre id="raw-output" class="output output--raw hidden" aria-live="polite"></pre>
          <p class="hint" id="response-note"></p>
        </section>
      </main>

      <footer class="footer">
        <span>Tip: Start the services first, then send requests.</span>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
